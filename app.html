<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RésiHub — Espace de révision</title>
<style>
:root{
  --paper:#f4f7f8; --surface:#ffffff; --ink:#0d1b2a; --ink-soft:#13293d;
  --primary:#0e7c86; --primary-d:#0a5a62; --primary-t:#e2f1f2;
  --accent:#f2a007; --accent-d:#c67f04; --accent-t:#fdf1d8;
  --vital:#f5556d; --vital-t:#fde1e5;
  --ok:#12a150; --ok-t:#e3f5ea; --bad:#e5484d; --bad-t:#fbe5e6;
  --muted:#5b6b7b; --faint:#8798a6; --line:#e3e9ed; --line-2:#eef2f4;
  --r:14px; --r-s:10px; --shadow:0 1px 2px rgba(13,27,42,.04),0 8px 24px -12px rgba(13,27,42,.14);
  --shadow-lg:0 24px 60px -24px rgba(13,27,42,.30);
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.num{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:6px}
h1,h2,h3{text-wrap:balance;line-height:1.15;letter-spacing:-.02em}

/* ── Shell ─────────────────────────────────────────── */
.app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
.side{background:var(--ink);color:#c3d0da;position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;padding:20px 14px;gap:6px}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;color:#fff}
.brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--primary),#0bb0a0);
  display:grid;place-items:center;flex:none;box-shadow:0 6px 16px -6px rgba(14,124,134,.7)}
.brand b{font-size:18px;letter-spacing:-.02em}
.brand b span{color:#7fe3d8}
.nav{display:flex;flex-direction:column;gap:3px}
.nav-label{font:600 11px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;
  color:#5f7382;padding:14px 10px 6px}
.nav button{display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border-radius:9px;
  color:#a9b8c4;font-size:14px;font-weight:500;text-align:left;transition:background .15s,color .15s}
.nav button svg{width:19px;height:19px;flex:none}
.nav button:hover{background:#182838;color:#e7edf1}
.nav button.on{background:#1c3140;color:#fff}
.nav button.on svg{color:#7fe3d8}
.side-foot{margin-top:auto;padding:12px 10px;border-top:1px solid #1e2f3e;font-size:12px;color:#6d8090}
.side-foot .pro{display:flex;align-items:center;gap:8px;color:#f4c66a;font-weight:600;margin-bottom:4px}

/* ── Topbar ───────────────────────────────────────── */
.main{display:flex;flex-direction:column;min-width:0}
.top{position:sticky;top:0;z-index:20;background:rgba(244,247,248,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;
  padding:12px 26px}
.top .title{font-weight:700;font-size:15px;letter-spacing:-.01em}
.top .spacer{flex:1}
.stat-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);
  border-radius:999px;padding:6px 13px 6px 9px;font-size:13px;font-weight:600;box-shadow:var(--shadow)}
.stat-chip svg{width:17px;height:17px}
.stat-chip .k{color:var(--muted);font-weight:500}
.chip-streak svg{color:var(--vital)} .chip-xp svg{color:var(--accent)}
.lvl{display:flex;align-items:center;gap:9px}
.lvl .ring{width:34px;height:34px}
.lvl .who{font-size:12px;line-height:1.25}
.lvl .who b{display:block;font-size:13px}
.lvl .who span{color:var(--muted)}

.view{padding:26px;max-width:1120px;width:100%;margin:0 auto;animation:rise .4s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.demo-banner{display:flex;align-items:center;gap:10px;background:var(--accent-t);color:#7a5300;
  border:1px solid #f0d79a;border-radius:var(--r-s);padding:9px 14px;font-size:13px;margin-bottom:22px}
.demo-banner svg{width:17px;height:17px;flex:none}
.demo-banner b{font-weight:700}

/* ── Generic ──────────────────────────────────────── */
.eyebrow{font:600 11px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--primary)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.section-h{display:flex;align-items:baseline;justify-content:space-between;margin:30px 0 14px}
.section-h h2{font-size:19px}
.section-h a{font-size:13px;font-weight:600;color:var(--primary)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--primary);color:#fff;
  border-radius:10px;padding:11px 18px;font-weight:600;font-size:14px;transition:transform .12s,box-shadow .2s,background .15s;
  box-shadow:0 8px 20px -10px rgba(14,124,134,.8)}
.btn:hover{background:var(--primary-d);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn svg{width:18px;height:18px}
.btn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:var(--shadow)}
.btn.ghost:hover{background:var(--line-2)}
.btn.amber{background:var(--accent);box-shadow:0 8px 20px -10px rgba(242,160,7,.8)}
.btn.amber:hover{background:var(--accent-d)}
.btn.wide{width:100%}

/* ── Dashboard ────────────────────────────────────── */
.hero{position:relative;overflow:hidden;background:linear-gradient(120deg,#0c2231,#0e3a44 60%,#0e7c86);
  color:#fff;border-radius:18px;padding:26px 28px}
.hero .eyebrow{color:#8fe6db}
.hero h1{font-size:27px;margin:8px 0 6px;color:#fff}
.hero p{color:#bcd6d9;max-width:52ch;font-size:14px}
.hero .cta{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.ekg{position:absolute;right:0;bottom:0;width:340px;height:120px;opacity:.5;pointer-events:none}
.ekg path{fill:none;stroke:#7fe3d8;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:600;stroke-dashoffset:600;animation:trace 3.4s linear infinite}
@keyframes trace{to{stroke-dashoffset:-600}}

.vitals{grid-template-columns:repeat(4,1fr);margin-top:16px}
.vital{padding:16px 18px;display:flex;flex-direction:column;gap:2px;position:relative;overflow:hidden}
.vital .ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;margin-bottom:8px}
.vital .ico svg{width:19px;height:19px}
.vital .v{font-size:26px;font-weight:800;letter-spacing:-.03em}
.vital .l{font-size:12.5px;color:var(--muted);font-weight:500}
.i-xp{background:var(--accent-t);color:var(--accent-d)} .i-streak{background:var(--vital-t);color:var(--vital)}
.i-acc{background:var(--primary-t);color:var(--primary-d)} .i-done{background:var(--ok-t);color:var(--ok)}

.two{grid-template-columns:1.5fr 1fr;align-items:start}
.panel{padding:20px}
.panel h3{font-size:15px;margin-bottom:2px}
.panel .sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.subj-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-top:1px solid var(--line-2)}
.subj-row:first-of-type{border-top:none}
.subj-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none;background:var(--primary-t);color:var(--primary-d)}
.subj-ic svg{width:21px;height:21px}
.subj-row .nm{flex:1;min-width:0}
.subj-row .nm b{font-size:14px;font-weight:600;display:block}
.subj-row .nm .bar{height:6px;background:var(--line);border-radius:99px;margin-top:6px;overflow:hidden}
.subj-row .nm .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#25b0a0);border-radius:99px;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.subj-row .pct{font:700 13px var(--mono);color:var(--muted);width:40px;text-align:right}

.badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{display:flex;flex-direction:column;align-items:center;gap:6px;width:78px;text-align:center}
.badge .disc{width:52px;height:52px;border-radius:50%;display:grid;place-items:center;
  background:var(--accent-t);color:var(--accent-d);border:2px solid #f2d79a}
.badge.lock .disc{background:var(--line-2);color:var(--faint);border-color:var(--line)}
.badge .disc svg{width:24px;height:24px}
.badge span{font-size:11px;color:var(--muted);line-height:1.2;font-weight:500}
.spark{display:flex;align-items:flex-end;gap:6px;height:64px;margin-top:6px}
.spark .b{flex:1;background:var(--primary-t);border-radius:5px 5px 3px 3px;position:relative;transition:height .8s}
.spark .b.today{background:linear-gradient(180deg,var(--accent),var(--accent-d))}
.spark-x{display:flex;gap:6px;margin-top:6px}
.spark-x span{flex:1;text-align:center;font:600 10px var(--mono);color:var(--faint)}

/* ── Programme ────────────────────────────────────── */
.prog-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.pcard{padding:18px;display:flex;flex-direction:column;gap:12px;transition:transform .14s,box-shadow .2s;border-top:3px solid var(--primary)}
.pcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.pcard .top-r{display:flex;align-items:center;gap:12px}
.pcard .ic{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;flex:none;background:var(--primary-t);color:var(--primary-d)}
.pcard .ic svg{width:24px;height:24px}
.pcard h3{font-size:16px}
.pcard .meta{font:600 12px var(--mono);color:var(--faint)}
.pcard .bar{height:7px;background:var(--line);border-radius:99px;overflow:hidden}
.pcard .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#25b0a0)}
.pcard .foot{display:flex;align-items:center;justify-content:space-between;margin-top:2px}
.pcard .foot .p{font:700 13px var(--mono);color:var(--muted)}

/* ── Quiz ─────────────────────────────────────────── */
.quiz{max-width:760px;margin:0 auto}
.quiz-top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.quiz-top .prog{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden}
.quiz-top .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#25b0a0);border-radius:99px;transition:width .35s}
.quiz-top .count{font:700 13px var(--mono);color:var(--muted)}
.quiz-top .timer{display:flex;align-items:center;gap:6px;font:700 14px var(--mono);color:var(--ink)}
.quiz-top .timer svg{width:16px;height:16px;color:var(--vital)}
.q-card{padding:26px}
.q-tag{display:inline-flex;align-items:center;gap:7px;font:600 11px var(--mono);letter-spacing:.08em;
  text-transform:uppercase;color:var(--primary-d);background:var(--primary-t);padding:5px 10px;border-radius:99px}
.q-text{font-size:20px;font-weight:700;letter-spacing:-.01em;margin:16px 0 20px;line-height:1.32}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:14px 16px;
  border:1.5px solid var(--line);border-radius:12px;background:var(--surface);font-size:15px;font-weight:500;
  transition:border-color .15s,background .15s,transform .1s}
.opt:hover:not(:disabled){border-color:var(--primary);background:var(--primary-t)}
.opt .key{width:26px;height:26px;border-radius:7px;background:var(--line-2);color:var(--muted);
  display:grid;place-items:center;font:700 13px var(--mono);flex:none;transition:background .15s,color .15s}
.opt.sel{border-color:var(--primary)}
.opt.ok{border-color:var(--ok);background:var(--ok-t)} .opt.ok .key{background:var(--ok);color:#fff}
.opt.no{border-color:var(--bad);background:var(--bad-t)} .opt.no .key{background:var(--bad);color:#fff}
.opt .mark{margin-left:auto;width:20px;height:20px}
.opt:disabled{cursor:default}
.expl{margin-top:18px;padding:15px 16px;border-radius:12px;background:var(--line-2);border-left:3px solid var(--primary);
  font-size:14px;color:var(--ink-soft);animation:rise .3s ease both}
.expl b{color:var(--primary-d)}
.q-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.xp-pop{position:fixed;left:50%;top:30%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:12px 20px;border-radius:99px;font-weight:700;box-shadow:var(--shadow-lg);z-index:50;
  display:flex;align-items:center;gap:9px;opacity:0}
.xp-pop svg{width:20px;height:20px;color:var(--accent)}
.xp-pop.show{animation:pop 1.1s ease both}
@keyframes pop{0%{opacity:0;transform:translate(-50%,10px) scale(.9)}18%{opacity:1;transform:translate(-50%,0) scale(1)}
  75%{opacity:1}100%{opacity:0;transform:translate(-50%,-16px)}}

/* ── Result ───────────────────────────────────────── */
.result{max-width:560px;margin:8px auto;text-align:center;padding:34px 30px}
.result .score-ring{width:150px;height:150px;margin:6px auto 14px}
.result h2{font-size:24px;margin-bottom:6px}
.result .r-sub{color:var(--muted);margin-bottom:22px}
.result .r-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px}
.result .r-stat{background:var(--line-2);border-radius:12px;padding:14px 8px}
.result .r-stat .v{font-size:22px;font-weight:800}
.result .r-stat .l{font-size:12px;color:var(--muted)}
.result .r-actions{display:flex;gap:10px;justify-content:center}

/* ── Leaderboard ──────────────────────────────────── */
.lb{overflow:hidden}
.lb-row{display:flex;align-items:center;gap:14px;padding:13px 20px;border-top:1px solid var(--line-2)}
.lb-row.me{background:var(--primary-t)}
.lb-rank{width:30px;font:800 15px var(--mono);color:var(--muted);text-align:center}
.lb-rank.top{color:var(--accent-d)}
.lb-av{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;flex:none}
.lb-row .nm{flex:1;font-weight:600}
.lb-row .nm small{display:block;color:var(--faint);font-weight:500;font-size:12px}
.lb-xp{font:700 14px var(--mono);color:var(--primary-d)}

/* ── Pricing ──────────────────────────────────────── */
.price-wrap{grid-template-columns:1fr 1fr;align-items:stretch}
.plan{padding:26px;display:flex;flex-direction:column;gap:8px}
.plan.feat{border:2px solid var(--primary);position:relative}
.plan.feat .tagpop{position:absolute;top:-11px;left:26px;background:var(--primary);color:#fff;
  font:700 11px var(--mono);letter-spacing:.05em;padding:4px 11px;border-radius:99px}
.plan h3{font-size:17px}
.plan .price{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:2px 0}
.plan .price small{font-size:14px;font-weight:600;color:var(--muted)}
.plan .save{font:700 12px var(--mono);color:var(--ok);background:var(--ok-t);padding:3px 9px;border-radius:99px;align-self:flex-start}
.plan ul{list-style:none;display:flex;flex-direction:column;gap:9px;margin:12px 0 18px}
.plan li{display:flex;gap:10px;font-size:14px;align-items:flex-start}
.plan li svg{width:18px;height:18px;color:var(--ok);flex:none;margin-top:1px}
.plan .btn{margin-top:auto}
.pay-note{display:flex;align-items:center;gap:8px;justify-content:center;color:var(--faint);font-size:12.5px;margin-top:16px}
.pay-note svg{width:15px;height:15px}

/* ── Ressources ───────────────────────────────────── */
.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.pill{padding:7px 14px;border-radius:99px;border:1.5px solid var(--line);background:var(--surface);
  font-size:13px;font-weight:600;color:var(--muted);transition:all .15s}
.pill:hover{border-color:var(--primary);color:var(--primary-d)}
.pill.on{background:var(--primary);border-color:var(--primary);color:#fff}
.res-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.rcard{padding:18px;display:flex;flex-direction:column;gap:8px;transition:transform .14s,box-shadow .2s}
.rcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.rcard .r-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.rcard h3{font-size:15.5px}
.rcard p{font-size:13.5px;color:var(--muted);flex:1}
.acc-badge{font:700 11px var(--mono);padding:4px 10px;border-radius:99px;white-space:nowrap;flex:none}
.acc-free{background:var(--ok-t);color:var(--ok)}
.acc-mix{background:var(--accent-t);color:var(--accent-d)}
.rcard a{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:700;color:var(--primary);text-decoration:none;margin-top:2px}
.rcard a svg{width:15px;height:15px}
.rcard a:hover{color:var(--primary-d)}
/* ── Examen blanc ─────────────────────────────────── */
.exam-hero{padding:28px;border-top:3px solid var(--vital)}
.exam-rules{display:flex;flex-direction:column;gap:10px;margin:18px 0 22px}
.exam-rules li{display:flex;gap:11px;align-items:flex-start;font-size:14.5px;list-style:none}
.exam-rules svg{width:19px;height:19px;color:var(--vital);flex:none;margin-top:1px}
.timer.low{color:var(--vital);animation:blink 1s steps(2) infinite}
@keyframes blink{50%{opacity:.45}}
.rev-item{padding:16px 18px;border-top:1px solid var(--line-2)}
.rev-item .rv-h{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.rev-item .rv-h b{font-size:14px;flex:1}
.rev-tag{font:700 11px var(--mono);padding:3px 9px;border-radius:99px;flex:none}
.rev-ok{background:var(--ok-t);color:var(--ok)} .rev-no{background:var(--bad-t);color:var(--bad)}
.rev-skip{background:var(--line-2);color:var(--muted)}
.rev-item .rv-a{font-size:13.5px;color:var(--muted);margin:2px 0}
.rev-item .rv-a b{color:var(--ink)}
.rev-item .rv-e{font-size:13.5px;background:var(--line-2);border-left:3px solid var(--primary);
  border-radius:8px;padding:10px 12px;margin-top:8px;color:var(--ink-soft)}
/* ── Contribuer (formulaire) ──────────────────────── */
.form-grid{display:flex;flex-direction:column;gap:14px}
.fld label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
.fld input[type=text],.fld textarea,.fld select{width:100%;font-family:inherit;font-size:14px;color:var(--ink);
  background:var(--surface);border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;transition:border-color .15s}
.fld input[type=text]:focus,.fld textarea:focus,.fld select:focus{border-color:var(--primary);outline:none}
.fld textarea{resize:vertical;min-height:60px;line-height:1.5}
.opt-in{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.opt-in input[type=radio]{width:18px;height:18px;accent-color:var(--primary);flex:none}
.opt-in input[type=text]{flex:1}
.row2{display:flex;gap:12px}.row2>*{flex:1}
.hint{font-size:12px;color:var(--faint);margin-top:-4px}
.qitem{display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-top:1px solid var(--line-2)}
.qitem:first-of-type{border-top:none}
.qitem .qx{flex:1;font-size:13.5px;line-height:1.4}
.qitem .qx small{color:var(--faint);font-weight:700;font-family:var(--mono);text-transform:uppercase;font-size:10.5px;letter-spacing:.05em}
.qitem .del{color:var(--bad);flex:none;padding:3px}
.qitem .del svg{width:17px;height:17px}
.empty-b{text-align:center;color:var(--faint);font-size:13px;padding:20px 0}
@media(max-width:920px){
  .app{grid-template-columns:1fr}
  .side{position:fixed;left:0;top:0;z-index:40;transform:translateX(-100%);transition:transform .25s;width:236px}
  .side.open{transform:none}
  .menu-btn{display:grid!important}
  .two,.price-wrap{grid-template-columns:1fr}
  .vitals{grid-template-columns:repeat(2,1fr)}
  .scrim{display:none;position:fixed;inset:0;background:rgba(13,27,42,.4);z-index:35}
  .scrim.on{display:block}
}
.menu-btn{display:none;width:38px;height:38px;border-radius:9px;place-items:center;background:var(--surface);border:1px solid var(--line)}
.menu-btn svg{width:20px;height:20px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

        <span class="num" id="cStreak">0</span><span class="k">j</span>

            stroke-linecap="round" transform="rotate(-90 18 18)" id="lvlArc"/>
          <text x="18" y="22" text-anchor="middle" font-size="13" font-weight="800" fill="var(--ink)" id="lvlNum" class="num">1</text>
        </svg>
        <div class="who"><b>Étudiant·e</b><span>Niveau <span id="lvlWord">1</span></span></div>
      </div>
    </header>
    <div id="app"></div>
  </div>
</div>
<div class="xp-pop" id="xpPop"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h6l-2 8 10-12h-6z"/></svg><span id="xpPopTxt">+10 XP</span></div>

<script>
"use strict";
/* ── Icônes ─────────────────────────────────────────── */
const I = {
  dash:'<path d="M3 13h8V3H3zM13 21h8v-8h-8zM13 3v6h8V3zM3 21h8v-6H3z"/>',
  book:'<path d="M4 5a2 2 0 012-2h13v18H6a2 2 0 01-2-2z"/><path d="M4 17h15"/>',
  trophy:'<path d="M7 4h10v3a5 5 0 01-10 0zM5 5H3v2a3 3 0 003 3M19 5h2v2a3 3 0 01-3 3M9 17h6M10 17v-3M14 17v-3M8 21h8"/>',
  star:'<path d="M12 2l2.9 6.3 6.9.6-5.2 4.6 1.6 6.8L12 17.3 5.8 20.9l1.6-6.8L2.2 8.9l6.9-.6z"/>',
  heart:'<path d="M12 21s-7-4.6-9.3-9C1.2 9 2.5 5.5 6 5.5c2 0 3 1 4 2.5 1-1.5 2-2.5 4-2.5 3.5 0 4.8 3.5 3.3 6.5C19 16.4 12 21 12 21z"/>',
  lungs:'<path d="M12 3v8M9 8c0 6-1 7-4 9-1.6 1-3-.2-3-2 0-4 1.5-8 4-9 2-.8 3 0 3 2M15 8c0 6 1 7 4 9 1.6 1 3-.2 3-2 0-4-1.5-8-4-9-2-.8-3 0-3 2"/>',
  brain:'<path d="M9 3a3 3 0 00-3 3 3 3 0 00-1 5 3 3 0 002 5 3 3 0 006 0V4a3 3 0 00-3-3zM15 3a3 3 0 013 3 3 3 0 011 5 3 3 0 01-2 5"/>',
  kidney:'<path d="M8 4C5 4 4 7 4 10c0 5 3 10 6 10 2 0 2-2 2-4M16 4c3 0 4 3 4 6 0 5-3 10-6 10-2 0-2-2-2-4"/>',
  stomach:'<path d="M6 3v5a5 5 0 005 5h2a4 4 0 014 4 3 3 0 01-6 0"/>',
  drop:'<path d="M12 3s6 6.5 6 11a6 6 0 01-12 0c0-4.5 6-11 6-11z"/>',
  bug:'<path d="M8 8a4 4 0 018 0v3a4 4 0 01-8 0zM8 10H4M16 10h4M8 14H4M16 14h4M9 5L7 3M15 5l2-2"/>',
  bolt:'<path d="M13 2L3 14h6l-2 8 10-12h-6z"/>',
  flame:'<path d="M12 2s5 4.5 5 9a5 5 0 01-10 0c0-1.6.6-3 1.4-4C8.5 8.6 9 10 10 10.5 9.4 8 12 2 12 2z"/>',
  target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4"/>',
  check2:'<path d="M20 6L9 17l-5-5"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  lock:'<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/>',
  medal:'<circle cx="12" cy="14" r="6"/><path d="M9 8L7 2M15 8l2-6M12 12v4M10 14h4"/>',
  info:'<circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v4h1"/>',
  globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 3.8 5.7 3.8 9S14.5 18.4 12 21c-2.5-2.6-3.8-5.7-3.8-9S9.5 5.6 12 3z"/>',
  clip:'<rect x="6" y="4" width="12" height="17" rx="2"/><path d="M9 4a3 3 0 016 0M9 10h6M9 14h6M9 18h4"/>',
  ext:'<path d="M14 4h6v6M20 4l-9 9M19 14v5a2 2 0 01-2 2H6a2 2 0 01-2-2V8a2 2 0 012-2h5"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  dl:'<path d="M12 3v13M7 11l5 5 5-5M5 21h14"/>',
  up:'<path d="M12 21V8M7 13l5-5 5 5M5 3h14"/>',
  trash:'<path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2M6 7l1 13a1 1 0 001 1h8a1 1 0 001-1l1-13"/>',
  play:'<path d="M6 4l14 8-14 8z"/>',
  shield:'<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/>'
};
const ic=(k,w=20,fill=false)=>`<svg viewBox="0 0 24 24" width="${w}" height="${w}" fill="${fill?'currentColor':'none'}" stroke="${fill?'none':'currentColor'}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">${I[k]}</svg>`;

/* ── Données (matières + QCM de démonstration) ──────── */
const SUBJECTS = [
  {k:'cardio',name:'Cardiologie',icon:'heart',pool:1240},
  {k:'pneumo',name:'Pneumologie',icon:'lungs',pool:980},
  {k:'neuro',name:'Neurologie',icon:'brain',pool:1120},
  {k:'nephro',name:'Néphrologie',icon:'kidney',pool:760},
  {k:'gastro',name:'Gastro-entérologie',icon:'stomach',pool:1050},
  {k:'endoc',name:'Endocrinologie',icon:'drop',pool:840},
  {k:'infectio',name:'Infectiologie',icon:'bug',pool:990},
  {k:'hemato',name:'Hématologie',icon:'drop',pool:720},
];
const SUBJ = Object.fromEntries(SUBJECTS.map(s=>[s.k,s]));

// QCM de DÉMONSTRATION — bases classiques, à valider par des médecins avant tout usage réel.
const QUESTIONS = [
 {id:'c1',s:'cardio',d:2,q:"À la phase aiguë d'un infarctus du myocarde, quel signe ECG est le plus caractéristique ?",o:["Sus-décalage du segment ST","Onde U proéminente","Allongement du QT isolé","Bloc de branche droit isolé"],a:0,e:"Le sus-décalage ST traduit la lésion transmurale aiguë (SCA ST+)."},
 {id:'c2',s:'cardio',d:1,q:"Quelle structure est le pacemaker physiologique du cœur ?",o:["Le nœud auriculo-ventriculaire","Le nœud sinusal (sino-atrial)","Le faisceau de His","Les fibres de Purkinje"],a:1,e:"Le nœud sinusal impose le rythme (60–100/min au repos)."},
 {id:'c3',s:'cardio',d:2,q:"Premier geste devant un arrêt cardio-respiratoire chez l'adulte ?",o:["Injecter de l'adrénaline","Débuter les compressions thoraciques","Poser une voie veineuse","Faire un ECG 12 dérivations"],a:1,e:"La réanimation cardio-pulmonaire (compressions) prime, avec alerte et défibrillation précoce."},
 {id:'p1',s:'pneumo',d:2,q:"Examen de référence pour confirmer une embolie pulmonaire ?",o:["Radiographie thoracique","Angioscanner thoracique","Spirométrie","Échographie abdominale"],a:1,e:"L'angioscanner (angio-TDM) visualise directement le thrombus artériel pulmonaire."},
 {id:'p2',s:'pneumo',d:1,q:"Quel test évalue au mieux un trouble ventilatoire obstructif ?",o:["Le rapport VEMS/CVF","La saturation seule","La radiographie","Le D-dimère"],a:0,e:"Un rapport VEMS/CVF abaissé (< 0,7) définit le syndrome obstructif."},
 {id:'p3',s:'pneumo',d:2,q:"Germe le plus fréquent de la pneumonie aiguë communautaire ?",o:["Mycoplasma pneumoniae","Streptococcus pneumoniae","Legionella pneumophila","Klebsiella pneumoniae"],a:1,e:"Le pneumocoque reste le premier agent, y compris des formes graves."},
 {id:'n1',s:'neuro',d:3,q:"Chez un droitier, une aphasie avec hémiplégie droite oriente vers une atteinte de quel hémisphère ?",o:["Hémisphère droit","Hémisphère gauche","Cervelet","Tronc cérébral bas"],a:1,e:"Le langage est majoritairement latéralisé à gauche chez le droitier."},
 {id:'n2',s:'neuro',d:2,q:"Délai indicatif classique pour la thrombolyse d'un AVC ischémique ?",o:["Jusqu'à 4h30","Jusqu'à 24h systématiquement","Au-delà de 48h","Aucun délai"],a:0,e:"La fenêtre thérapeutique de la thrombolyse IV est classiquement ≤ 4h30 (sous conditions)."},
 {id:'np1',s:'nephro',d:2,q:"Première cause d'insuffisance rénale chronique dans le monde ?",o:["Les lithiases","Le diabète","Les infections urinaires","Les AINS"],a:1,e:"La néphropathie diabétique est la première étiologie d'IRC terminale."},
 {id:'np2',s:'nephro',d:1,q:"Quel ion doit être surveillé en priorité dans l'insuffisance rénale aiguë ?",o:["Le calcium","Le potassium","Le magnésium","Le chlore"],a:1,e:"L'hyperkaliémie est la menace vitale immédiate (troubles du rythme)."},
 {id:'g1',s:'gastro',d:1,q:"Quelle bactérie est associée à la maladie ulcéreuse gastro-duodénale ?",o:["Escherichia coli","Helicobacter pylori","Salmonella","Clostridioides difficile"],a:1,e:"H. pylori est impliqué dans la majorité des ulcères non liés aux AINS."},
 {id:'g2',s:'gastro',d:2,q:"Signe d'alarme imposant une endoscopie devant une dyspepsie ?",o:["Ballonnement isolé","Amaigrissement / dysphagie","Éructations","Pyrosis occasionnel"],a:1,e:"Les signes d'alarme (dysphagie, amaigrissement, anémie, hémorragie) imposent l'endoscopie."},
 {id:'e1',s:'endoc',d:1,q:"Quelle hormone fait défaut dans le diabète de type 1 ?",o:["Le glucagon","L'insuline","La cortisol","La TSH"],a:1,e:"Le DT1 résulte d'une carence en insuline par destruction des cellules bêta."},
 {id:'e2',s:'endoc',d:2,q:"Examen recommandé pour le suivi de l'équilibre glycémique au long cours ?",o:["Glycémie à jeun unique","Hémoglobine glyquée (HbA1c)","Bandelette urinaire","Ionogramme"],a:1,e:"L'HbA1c reflète la glycémie moyenne des ~3 derniers mois."},
 {id:'i1',s:'infectio',d:1,q:"Antibiotique de première intention d'une angine à streptocoque A ?",o:["Amoxicilline","Ciprofloxacine","Vancomycine","Métronidazole"],a:0,e:"L'amoxicilline (pénicilline) est le traitement de référence de l'angine à SGA."},
 {id:'i2',s:'infectio',d:2,q:"Quel élément définit un sepsis selon les concepts récents ?",o:["Fièvre isolée","Dysfonction d'organe due à une infection","Hyperleucocytose seule","Tachycardie isolée"],a:1,e:"Le sepsis = infection + dysfonction d'organe (score SOFA)."},
 {id:'h1',s:'hemato',d:1,q:"Carence responsable de l'anémie microcytaire la plus fréquente ?",o:["Vitamine B12","Fer","Folates","Vitamine C"],a:1,e:"La carence martiale (fer) donne une anémie microcytaire hypochrome."},
 {id:'h2',s:'hemato',d:2,q:"Quel bilan explore en première intention une anémie ?",o:["Numération + réticulocytes","D-dimères","Troponine","Lipase"],a:0,e:"NFS et réticulocytes orientent entre anémie régénérative et arégénérative."},
];

// Banque personnalisée (contributions), fusionnée avec la démo et jouable partout.
let CUSTOM=loadCustom();
function loadCustom(){try{const r=JSON.parse(localStorage.getItem('resihub_q'));if(Array.isArray(r))return r;}catch(e){}return [];}
function saveCustom(){localStorage.setItem('resihub_q',JSON.stringify(CUSTOM));}
function bank(){return QUESTIONS.concat(CUSTOM);}
const val=id=>{const el=document.getElementById(id);return el?el.value:'';};
function toast(msg){const p=document.getElementById('xpPop');document.getElementById('xpPopTxt').textContent=msg;p.classList.remove('show');void p.offsetWidth;p.classList.add('show');}

const BADGES=[
 {k:'first',name:'Première session',icon:'play',test:st=>st.sessions>=1},
 {k:'perfect',name:'Sans-faute',icon:'shield',test:st=>st.perfect>=1},
 {k:'streak3',name:'Série de 3',icon:'flame',test:st=>st.streak>=3},
 {k:'fifty',name:'50 QCM',icon:'medal',test:st=>st.answered>=50},
 {k:'sharp',name:'Précision 80%',icon:'target',test:st=>st.answered>=10&&st.correct/st.answered>=.8},
 {k:'lvl5',name:'Niveau 5',icon:'star',test:st=>levelOf(st.xp)>=5},
];

/* ── État ───────────────────────────────────────────── */
const DEFAULT={xp:0,streak:0,lastDay:null,answered:0,correct:0,sessions:0,perfect:0,
  subj:Object.fromEntries(SUBJECTS.map(s=>[s.k,0])),week:[0,0,0,0,0,0,0]};
let st=load();
function load(){try{const r=JSON.parse(localStorage.getItem('resihub'));if(r)return Object.assign({},DEFAULT,r);}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){localStorage.setItem('resihub',JSON.stringify(st));}
function levelOf(xp){return Math.floor(Math.pow(xp/60,0.62))+1;}
function xpForLevel(l){return Math.ceil(60*Math.pow(l-1,1/0.62));}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function touchDay(){
  const t=todayKey();
  if(st.lastDay===t)return;
  // simple streak: +1 si activité aujourd'hui (démo, ne vérifie pas la veille précise)
  st.streak=st.lastDay?st.streak+1:1;
  st.lastDay=t;
  const wd=(new Date().getDay()+6)%7; // Lundi=0
  save();
}

/* ── Rendu global ───────────────────────────────────── */
const app=document.getElementById('app');
let route='dash';
const ROUTES=[
  {k:'dash',label:'Tableau de bord',icon:'dash',title:'Tableau de bord'},
  {k:'prog',label:'Programme',icon:'book',title:'Programme de révision'},
  {k:'exam',label:'Examen blanc',icon:'clip',title:'Examen blanc'},
  {k:'res',label:'Ressources',icon:'globe',title:'Ressources'},
  {k:'add',label:'Contribuer',icon:'edit',title:'Enrichir la banque de QCM'},
  {k:'rank',label:'Classement',icon:'trophy',title:'Classement'},
  {k:'sub',label:'Abonnement',icon:'star',title:'Abonnement'},
];
function buildNav(){
  document.getElementById('nav').innerHTML=ROUTES.map(r=>
    `<button data-r="${r.k}" class="${r.k===route?'on':''}">${ic(r.icon,19)}<span>${r.label}</span></button>`).join('');
  document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>{go(b.dataset.r);closeSide();});
}
function go(r){
  if(Q&&r!=='quiz'){stopTimer();Q=null;}
  if(E&&r!=='exam'){stopTimer();E=null;}
  route=r;const rt=ROUTES.find(x=>x.k===r);if(rt)document.getElementById('topTitle').textContent=rt.title;buildNav();render();window.scrollTo(0,0);}

function syncTop(){
  const lvl=levelOf(st.xp);
  document.getElementById('cXp').textContent=st.xp.toLocaleString('fr-FR');
  document.getElementById('cStreak').textContent=st.streak;
  document.getElementById('lvlNum').textContent=lvl;
  document.getElementById('lvlWord').textContent=lvl;
  const cur=xpForLevel(lvl),next=xpForLevel(lvl+1);
  const frac=Math.max(0,Math.min(1,(st.xp-cur)/(next-cur||1)));
  const arc=document.getElementById('lvlArc'),C=2*Math.PI*15.5;
  arc.style.strokeDasharray=C;arc.style.strokeDashoffset=C*(1-frac);
}

function render(){
  syncTop();
  if(route==='dash')renderDash();
  else if(route==='prog')renderProg();
  else if(route==='exam')(E?renderExam():renderExamIntro());
  else if(route==='res')renderRes();
  else if(route==='add')renderAdd();
  else if(route==='rank')renderRank();
  else if(route==='sub')renderSub();
  else if(route==='quiz')renderQuiz();
}
const demoBanner=`<div class="demo-banner">${ic('info',17)}<div><b>Prototype — contenu de démonstration.</b> Les QCM ci-dessous illustrent le moteur ; ils ne sont pas validés pour la révision réelle.</div></div>`;

/* ── Vue : Tableau de bord ──────────────────────────── */
function renderDash(){
  const acc=st.answered?Math.round(st.correct/st.answered*100):0;
  const earned=BADGES.filter(b=>b.test(st));
  const wkMax=Math.max(1,...st.week);
  const days=['L','M','M','J','V','S','D'],today=(new Date().getDay()+6)%7;
  const subjRows=SUBJECTS.slice(0,5).map(s=>{
    const p=st.subj[s.k]||0;
    return `<div class="subj-row"><span class="subj-ic">${ic(s.icon,21)}</span>
      <div class="nm"><b>${s.name}</b><div class="bar"><i style="width:${p}%"></i></div></div>
      <span class="pct num">${p}%</span></div>`;}).join('');
  app.innerHTML=`<div class="view">
    ${demoBanner}
    <section class="hero">
      <div class="eyebrow">Résidanat de médecine</div>
      <h1>Prêt·e pour ta session du jour ?</h1>
      <p>Programme intensif, minuté et gamifié. Enchaîne les QCM, gagne de l'XP, garde ta série.</p>
      <div class="cta">
        <button class="btn amber" onclick="startQuiz('mix')">${ic('play',18,true)} Session express · 5 QCM</button>
        <button class="btn ghost" style="color:#eaf6f6;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)" onclick="go('exam')">${ic('clip',17)} Examen blanc</button>
        <button class="btn ghost" style="color:#eaf6f6;background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)" onclick="go('prog')">Choisir une matière</button>
      </div>
      <svg class="ekg" viewBox="0 0 340 120" aria-hidden="true"><path d="M0 70 H70 l10 -30 l12 60 l14 -78 l10 48 H160 l12 -18 l10 18 H340"/></svg>
    </section>

    <div class="grid vitals">
      <div class="card vital"><span class="ico i-xp">${ic('bolt',19,true)}</span><span class="v num">${st.xp.toLocaleString('fr-FR')}</span><span class="l">Points XP</span></div>
      <div class="card vital"><span class="ico i-streak">${ic('flame',19,true)}</span><span class="v num">${st.streak}<span style="font-size:15px"> j</span></span><span class="l">Série en cours</span></div>
      <div class="card vital"><span class="ico i-acc">${ic('target',19)}</span><span class="v num">${acc}%</span><span class="l">Précision</span></div>
      <div class="card vital"><span class="ico i-done">${ic('check2',19)}</span><span class="v num">${st.answered}</span><span class="l">QCM traités</span></div>
    </div>

    <div class="grid two" style="margin-top:16px">
      <div class="card panel">
        <div class="section-h" style="margin:0 0 4px"><h3 style="font-size:15px">Progression par matière</h3><a href="#" onclick="go('prog');return false">Tout voir</a></div>
        <div class="sub">Ta maîtrise estimée sur les QCM traités</div>
        ${subjRows}
      </div>
      <div class="card panel">
        <h3>Activité de la semaine</h3>
        <div class="sub">QCM traités par jour</div>
        <div class="spark">${st.week.map((v,i)=>`<div class="b ${i===today?'today':''}" style="height:${Math.round(14+v/wkMax*50)}px" title="${v} QCM"></div>`).join('')}</div>
        <div class="spark-x">${days.map(d=>`<span>${d}</span>`).join('')}</div>
        <div class="section-h" style="margin:22px 0 12px"><h3 style="font-size:15px">Badges</h3><span class="num" style="font:700 12px var(--mono);color:var(--muted)">${earned.length}/${BADGES.length}</span></div>
        <div class="badges">${BADGES.map(b=>{const on=b.test(st);return `<div class="badge ${on?'':'lock'}"><span class="disc">${on?ic(b.icon,24,true):ic('lock',22)}</span><span>${b.name}</span></div>`}).join('')}</div>
      </div>
    </div>
  </div>`;
  requestAnimationFrame(()=>document.querySelectorAll('.subj-row .bar i').forEach(el=>{const w=el.style.width;el.style.width='0';requestAnimationFrame(()=>el.style.width=w);}));
}

/* ── Vue : Programme ────────────────────────────────── */
function renderProg(){
  app.innerHTML=`<div class="view">
    ${demoBanner}

    <div class="grid prog-grid">

let Q=null;
function startQuiz(scope){
  let pool=scope==='mix'?bank().slice():bank().filter(q=>q.s===scope);
  pool=shuffle(pool.slice()).slice(0,scope==='mix'?5:Math.min(6,pool.length));
  if(!pool.length){go('prog');return;}
  Q={pool,i:0,score:0,gained:0,scope,answered:false,t0:Date.now()};
  route='quiz';document.getElementById('topTitle').textContent='Session en cours';buildNav();renderQuiz();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function renderQuiz(){
  if(!Q){go('dash');return;}
  const q=Q.pool[Q.i],n=Q.pool.length,sj=SUBJ[q.s];
  const keys=['A','B','C','D','E'];
  app.innerHTML=`<div class="view"><div class="quiz">
    <div class="quiz-top">
      <span class="count num">${Q.i+1} / ${n}</span>
      <div class="prog"><i style="width:${(Q.i)/n*100}%"></i></div>
      <span class="timer"><span id="tk">0:00</span></span>
    </div>
    <div class="card q-card">
      <span class="q-tag">${ic(sj.icon,14)} ${sj.name} · difficulté ${q.d}/3</span>
      <div class="q-text">${q.q}</div>
      <div class="opts" id="opts">
        ${q.o.map((o,idx)=>`<button class="opt" data-i="${idx}" onclick="answer(${idx})"><span class="key">${keys[idx]}</span><span>${o}</span></button>`).join('')}
      </div>
      <div id="feedback"></div>
      <div class="q-actions" id="qa"></div>
    </div>
    <div style="text-align:center;margin-top:14px"><button class="btn ghost" style="padding:8px 14px" onclick="quitQuiz()">Quitter la session</button></div>
  </div></div>`;
  Q.answered=false;startTimer();
}
let timer=null;
function startTimer(){stopTimer();const el=document.getElementById('tk');const s0=Date.now();
  timer=setInterval(()=>{if(!el)return;const s=Math.floor((Date.now()-s0)/1000);el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');},500);}
function stopTimer(){if(timer)clearInterval(timer);timer=null;}

function answer(idx){
  if(!Q||Q.answered)return;Q.answered=true;
  const q=Q.pool[Q.i],correct=q.a;
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach(b=>{const i=+b.dataset.i;b.disabled=true;
    if(i===correct){b.classList.add('ok');b.querySelector('.mark')||b.insertAdjacentHTML('beforeend',`<span class="mark">${ic('check2',20)}</span>`);}
    if(i===idx&&i!==correct){b.classList.add('no');}
  });
  const good=idx===correct;
  if(good){Q.score++;const gain=6+q.d*2;Q.gained+=gain;st.xp+=gain;popXp(gain);}
  st.answered++;if(good)st.correct++;
  const wd=(new Date().getDay()+6)%7;st.week[wd]=(st.week[wd]||0)+1;
  // maîtrise matière (glissante, démo)
  const cur=st.subj[q.s]||0;st.subj[q.s]=Math.min(100,Math.round(cur+(good?4:1)));
  save();syncTop();
  document.getElementById('feedback').innerHTML=
    `<div class="expl"><b>${good?'Bonne réponse.':'Réponse : '+['A','B','C','D','E'][correct]+'.'}</b> ${q.e}</div>`;
  document.getElementById('qa').innerHTML=
    `<button class="btn" onclick="nextQ()">${Q.i+1<Q.pool.length?'Question suivante':'Voir le résultat'} →</button>`;
}
function nextQ(){if(Q.i+1<Q.pool.length){Q.i++;renderQuiz();}else finishQuiz();}
function quitQuiz(){stopTimer();Q=null;go('dash');}

function finishQuiz(){
  stopTimer();
  const n=Q.pool.length,sc=Q.score,pct=Math.round(sc/n*100);
  st.sessions++;if(sc===n)st.perfect++;
  touchDay();save();syncTop();
  const msg=pct===100?'Parcours sans-faute. Impressionnant.':pct>=60?'Bon rythme, continue comme ça.':'À retravailler — recommence pour progresser.';
  const C=2*Math.PI*66,off=C*(1-sc/n);
  app.innerHTML=`<div class="view"><div class="card result">
    <svg class="score-ring" viewBox="0 0 150 150">
      <circle cx="75" cy="75" r="66" fill="none" stroke="var(--line)" stroke-width="11"/>
      <circle cx="75" cy="75" r="66" fill="none" stroke="${pct>=60?'var(--ok)':'var(--vital)'}" stroke-width="11"
        stroke-linecap="round" transform="rotate(-90 75 75)" stroke-dasharray="${C}" stroke-dashoffset="${C}" id="scArc"/>
      <text x="75" y="70" text-anchor="middle" font-size="30" font-weight="800" fill="var(--ink)" class="num">${sc}/${n}</text>
      <text x="75" y="94" text-anchor="middle" font-size="12" fill="var(--muted)" class="num">${pct}%</text>
    </svg>
    <h2>Session terminée</h2>
    <div class="r-sub">${msg}</div>
    <div class="r-stats">
      <div class="r-stat"><div class="v num" style="color:var(--accent-d)">+${Q.gained}</div><div class="l">XP gagnés</div></div>
      <div class="r-stat"><div class="v num">${pct}%</div><div class="l">Précision</div></div>
      <div class="r-stat"><div class="v num">${st.streak} j</div><div class="l">Série</div></div>
    </div>
    <div class="r-actions">
      <button class="btn" onclick="startQuiz('${Q.scope}')">${ic('play',16,true)} Recommencer</button>
      <button class="btn ghost" onclick="quitQuiz()">Tableau de bord</button>
    </div>
  </div></div>`;
  requestAnimationFrame(()=>{const a=document.getElementById('scArc');if(a){a.style.transition='stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)';a.style.strokeDashoffset=off;}});
}

      </svg>

      <div class="r-stats">

        <div class="qx"><small>${(SUBJ[x.s]||{}).name||x.s} · niv ${x.d}</small><br>${x.q}</div>
        <button class="del" title="Supprimer" onclick="delQuestion('${x.id}')">${ic('trash',17)}</button>
      </div>`).join(''):`<div class="empty-b">Aucun QCM ajouté pour l'instant.<br>Crée le premier avec le formulaire.</div>`;
  app.innerHTML=`<div class="view">
    ${demoBanner}
    <div class="section-h" style="margin-top:0"><h2>Enrichir la banque de QCM</h2>
      <span class="num" style="font:700 13px var(--mono);color:var(--muted)">${mine} ajouté${mine>1?'s':''} · ${bank().length} au total</span></div>
    <p style="color:var(--muted);font-size:13.5px;max-width:70ch;margin-bottom:18px">
      Ajoute tes propres questions : elles deviennent <b>jouables immédiatement</b> dans les sessions et les examens blancs.
      Exporte le fichier pour le partager ou l'intégrer au dépôt. <b>Fais toujours relire le contenu médical par un médecin</b> avant diffusion réelle.</p>
    <div class="grid two" style="align-items:start">
      <div class="card panel">
        <h3>Nouveau QCM</h3><div class="sub">Choisis la matière, écris l'énoncé et coche la bonne réponse.</div>
        <div class="form-grid">
          <div class="row2">
            <div class="fld"><label>Matière</label><select id="aSubj">${subjOpts}</select></div>
            <div class="fld"><label>Difficulté</label><select id="aDiff"><option value="1">1 — Facile</option><option value="2" selected>2 — Moyen</option><option value="3">3 — Difficile</option></select></div>
          </div>
          <div class="fld"><label>Énoncé de la question</label><textarea id="aQ" placeholder="Ex : Quel est l'examen de référence pour…"></textarea></div>
          <div class="fld"><label>Réponses (coche la bonne)</label>
            ${[0,1,2,3].map(i=>`<div class="opt-in"><input type="radio" name="acorrect" value="${i}" ${i===0?'checked':''} aria-label="Bonne réponse ${i+1}"><input type="text" id="aO${i}" placeholder="Réponse ${'ABCD'[i]}${i<2?' (obligatoire)':' (facultatif)'}"></div>`).join('')}
            <div class="hint">Au moins 2 réponses. La réponse cochée doit être remplie.</div>
          </div>
          <div class="fld"><label>Explication (recommandée)</label><textarea id="aE" placeholder="Pourquoi cette réponse est correcte — la valeur pédagogique de RésiHub."></textarea></div>
          <button class="btn wide" onclick="addQuestion()">${ic('plus',18)} Ajouter à la banque</button>
        </div>
      </div>
      <div class="card panel">
        <h3>Ma banque</h3><div class="sub">Partage-la ou réimporte-la sur un autre appareil.</div>
        <div style="display:flex;gap:10px;margin-bottom:6px">
          <button class="btn ghost" style="flex:1;padding:9px" onclick="exportBank()">${ic('dl',16)} Exporter</button>
          <button class="btn ghost" style="flex:1;padding:9px" onclick="toggleImport()">${ic('up',16)} Importer</button>
        </div>
        <div id="importBox" style="display:none;margin-bottom:8px">
          <div class="fld"><textarea id="aImport" placeholder='Colle ici un JSON : [ { "s":"cardio", "d":2, "q":"…", "o":["…","…"], "a":0, "e":"…" } ]'></textarea></div>
          <button class="btn" style="padding:9px" onclick="doImport()">Importer le JSON</button>
        </div>
        <div class="qlist" style="margin-top:8px">${list}</div>
      </div>
    </div>
  </div>`;
}
function addQuestion(){
  const s=val('aSubj'),d=+val('aDiff')||1,q=val('aQ').trim(),e=val('aE').trim();
  const raw=[0,1,2,3].map(i=>val('aO'+i).trim());
  const sel=document.querySelector('input[name=acorrect]:checked');
  if(!q){toast("Écris l'énoncé de la question.");return;}
  if(raw.filter(x=>x).length<2){toast('Il faut au moins 2 réponses.');return;}
  if(!sel){toast('Coche la bonne réponse.');return;}
  const selIdx=+sel.value;
  if(!raw[selIdx]){toast('La réponse cochée est vide.');return;}
  const opts=[];let answer=0;
  raw.forEach((x,i)=>{if(x){if(i===selIdx)answer=opts.length;opts.push(x);}});
  CUSTOM.push({id:'u'+Date.now()+Math.floor(Math.random()*1000),s,d,q,o:opts,a:answer,e:e||'—',mine:true});
  saveCustom();toast('QCM ajouté ✓');renderAdd();
}
function delQuestion(id){CUSTOM=CUSTOM.filter(x=>x.id!==id);saveCustom();renderAdd();}
function toggleImport(){const b=document.getElementById('importBox');b.style.display=b.style.display==='none'?'block':'none';}
function exportBank(){
  if(!CUSTOM.length){toast('Ta banque est vide.');return;}
  const data={meta:{note:'QCM RésiHub — à faire relire par un médecin avant usage réel.',count:CUSTOM.length},questions:CUSTOM};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='resihub-questions.json';
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500);
  toast(CUSTOM.length+' QCM exporté'+(CUSTOM.length>1?'s':''));
}
function doImport(){
  const raw=val('aImport').trim();if(!raw){toast('Colle du JSON à importer.');return;}
  let arr;try{const p=JSON.parse(raw);arr=Array.isArray(p)?p:p.questions;}catch(e){toast('JSON invalide.');return;}
  if(!Array.isArray(arr)){toast('Format attendu : un tableau de questions.');return;}
  let n=0;
  arr.forEach(x=>{
    if(x&&x.q&&Array.isArray(x.o)&&x.o.length>=2&&typeof x.a==='number'&&x.o[x.a]){
      CUSTOM.push({id:x.id||('u'+Date.now()+Math.floor(Math.random()*1e4)),s:SUBJ[x.s]?x.s:'cardio',d:+x.d||1,q:String(x.q),o:x.o.map(String),a:x.a,e:x.e?String(x.e):'—',mine:true});
      n++;
    }
  });
  if(!n){toast('Aucune question valide trouvée.');return;}
  saveCustom();toast(n+' QCM importé'+(n>1?'s':''));renderAdd();
}

/* ── Menu mobile ────────────────────────────────────── */
const side=document.getElementById('side'),scrim=document.getElementById('scrim');
document.getElementById('menuBtn').onclick=()=>{side.classList.add('open');scrim.classList.add('on');};
function closeSide(){side.classList.remove('open');scrim.classList.remove('on');}
scrim.onclick=closeSide;

/* ── Init ───────────────────────────────────────────── */
buildNav();render();
</script>
</body>
</html>
